<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Student Record System</title>
    <!-- Modern Typography: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="ri-graduation-cap-fill"></i></div>
                <h1 class="logo-text">e-Student</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#" data-view="dashboard" class="nav-item active"><i class="ri-dashboard-line"></i> Dashboard</a></li>
                <li><a href="#" data-view="students" class="nav-item"><i class="ri-group-line"></i> Students</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-search">
                    <i class="ri-search-line" style="color: var(--text-muted); position: absolute; margin-left: 1rem; margin-top: 0.6rem;"></i>
                    <input type="text" placeholder="Search students (ID, Name, Email)..." style="padding: 0.5rem 1rem 0.5rem 2.5rem; border-radius: var(--radius-md); border: 1px solid var(--border); width: 300px; background: var(--bg-surface-hover);">
                </div>
                <div class="user-profile">
                    <i class="ri-notification-3-line" style="font-size: 1.25rem; margin-right: 1rem; color: var(--text-muted); cursor: pointer;"></i>
                    <div class="avatar">A</div>
                    <span>Admin User</span>
                </div>
            </header>

            <div class="content-wrapper" id="content-area">
                <!-- Views will be injected here via JavaScript -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="add-student-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-modal">&times;</span>
            <h2>Register New Student</h2>
            <form id="add-student-form">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="course">Course/Program</label>
                    <input type="text" id="course" required>
                </div>
                <button type="submit" class="btn btn-primary">Register Student</button>
            </form>
        </div>
    </div>

    <!-- Add Grade Modal -->
    <div id="add-grade-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-modal">&times;</span>
            <h2>Record Grade</h2>
            <form id="add-grade-form">
                <input type="hidden" id="grade-student-id">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" required>
                </div>
                <div class="form-group">
                    <label for="grade">Grade</label>
                    <input type="text" id="grade" required>
                </div>
                <div class="form-group">
                    <label for="semester">Semester</label>
                    <input type="text" id="semester" required>
                </div>
                <button type="submit" class="btn btn-primary">Save Grade</button>
            </form>
        </div>
    </div>

    <!-- Add Attendance Modal -->
    <div id="add-attendance-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-modal">&times;</span>
            <h2>Record Attendance</h2>
            <form id="add-attendance-form">
                <input type="hidden" id="attendance-student-id">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" required>
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                        <option value="Late">Late</option>
                        <option value="Excused">Excused</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Attendance</button>
            </form>
        </div>
    </div>

    <!-- Templates for Views -->
    <template id="view-dashboard">
        <div style="margin-bottom: 2rem;">
            <h2 style="font-size: 1.5rem; font-weight: 700;">System Overview</h2>
            <p style="color: var(--text-muted);">Real-time metrics for institutional data management and academic tracking.</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card glass-panel">
                <div class="stat-icon" style="background: #e0e7ff; color: #4f46e5;"><i class="ri-team-line"></i></div>
                <div class="stat-details">
                    <h3>Active Students</h3>
                    <p class="stat-number" id="stat-students">--</p>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Current term</p>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon" style="background: #f3e8ff; color: #9333ea;"><i class="ri-book-open-line"></i></div>
                <div class="stat-details">
                    <h3>Programs Tracked</h3>
                    <p class="stat-number" id="stat-grades">48</p>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Across 8 faculties</p>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon" style="background: #dcfce7; color: #16a34a;"><i class="ri-shield-check-line"></i></div>
                <div class="stat-details">
                    <h3>System Health</h3>
                    <p class="stat-number" id="stat-attendance">99.9%</p>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">No data inconsistencies</p>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon" style="background: #ffedd5; color: #ea580c;"><i class="ri-error-warning-line"></i></div>
                <div class="stat-details">
                    <h3>Pending Reviews</h3>
                    <p class="stat-number">1</p>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Students on probation</p>
                </div>
            </div>
        </div>
        <div class="recent-activity glass-panel" style="margin-top: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <div>
                    <h3>Academic Performance Trends</h3>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Institution-wide attendance vs. grade average</p>
                </div>
                <span style="background: var(--bg-surface-hover); padding: 0.25rem 0.5rem; border-radius: var(--radius-md); font-size: 0.75rem; color: var(--primary);"><i class="ri-funds-line"></i> +4.2% overall growth</span>
            </div>
            <div style="height: 200px; background: linear-gradient(180deg, rgba(59,130,246,0.1) 0%, rgba(255,255,255,0) 100%); border-bottom: 2px solid var(--primary); border-radius: var(--radius-md); position: relative;">
                <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 100 100" style="position: absolute; bottom: 0;">
                    <path d="M0,100 L0,80 Q25,60 50,70 T100,50 L100,100 Z" fill="rgba(59,130,246,0.2)" />
                    <path d="M0,80 Q25,60 50,70 T100,50" fill="none" stroke="var(--primary)" stroke-width="2" />
                </svg>
            </div>
        </div>
    </template>

    <template id="view-students">
        <div class="page-header">
            <div>
                <h2 style="font-size: 1.25rem; font-weight: 600;">Student Roster</h2>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Manage and view all registered students.</p>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-secondary" id="btn-export-csv"><i class="ri-download-line"></i> Export CSV</button>
                <button class="btn btn-primary" id="btn-add-student"><i class="ri-add-line"></i> Register Student</button>
            </div>
        </div>
        <div class="table-container glass-panel">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Enrollment Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="students-table-body">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </template>

    <template id="view-student-detail">
        <button class="btn btn-secondary mb-4" id="btn-back"><i class="ri-arrow-left-line"></i> Back to Students</button>
        <div class="student-profile-header glass-panel mb-4">
            <div class="profile-avatar"><i class="ri-user-fill"></i></div>
            <div class="profile-info">
                <h2 id="detail-name">Student Name</h2>
                <p><i class="ri-mail-line"></i> <span id="detail-email">email@example.com</span></p>
                <p><i class="ri-book-read-line"></i> <span id="detail-course">Course Name</span></p>
                <button class="btn btn-small" id="btn-print-report" style="margin-top:0.5rem;"><i class="ri-printer-line"></i> Generate Report</button>
            </div>
        </div>
        
        <div class="details-grid">
            <div class="detail-section glass-panel">
                <div class="section-header">
                    <h3>Grades</h3>
                    <button class="btn btn-small" id="btn-add-grade">Add</button>
                </div>
                <ul class="record-list" id="grades-list">
                    <!-- Populated via JS -->
                </ul>
            </div>
            <div class="detail-section glass-panel">
                <div class="section-header">
                    <h3>Attendance</h3>
                    <button class="btn btn-small" id="btn-add-attendance">Add</button>
                </div>
                <ul class="record-list" id="attendance-list">
                    <!-- Populated via JS -->
                </ul>
            </div>
        </div>
    </template>

    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <script type="module" src="/app.js"></script>
</body>
</html>
